      <rect x="-185" y="-155" width="118" height="210" rx="9" fill="#2B2824" stroke="#3A3630" stroke-width="1" style="fill:rgb(43, 40, 36);stroke:rgb(58, 54, 48);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
